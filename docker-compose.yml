# MySQL local para desenvolvimento
# Uso: docker compose up -d
# DATABASE_URL: mysql://d4sign_bitrix:d4sign_bitrix@127.0.0.1:3306/d4sign_bitrix?allowPublicKeyRetrieval=true

services:
  mysql:
    image: mysql:8.4
    container_name: d4sign-api-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: d4sign_bitrix
      MYSQL_USER: d4sign_bitrix
      MYSQL_PASSWORD: d4sign_bitrix
    volumes:
      - d4sign_api_mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s

volumes:
  d4sign_api_mysql_data:
